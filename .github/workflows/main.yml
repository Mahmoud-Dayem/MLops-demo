name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create file (simulate build)
        run: |
          mkdir dist
          echo "Hello Mohamed 🚀" > dist/file.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build   # 👈 wait for build job

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-artifact
          path: dist/

      - name: Show files
        run: |
          echo "Files inside dist:"
          ls dist
          cat dist/file.txt